services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api/}
        VITE_API_BE_URL: ${VITE_API_BE_URL:-http://localhost:4000/}
        VITE_ENVIRONMENT: production
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
